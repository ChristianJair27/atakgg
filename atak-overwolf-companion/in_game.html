<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATAK AI Companion</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: rgba(10, 10, 10, 0.96);
      color: #f1f5f9;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
      overflow: hidden;
      width: 420px;
      height: 520px;
    }

    ::-webkit-scrollbar       { width: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(239,68,68,0.3); border-radius: 1px; }

    /* ── Drag region (Overwolf) ── */
    #header { -webkit-app-region: drag; }
    .no-drag { -webkit-app-region: no-drag; }

    /* ── Layout ── */
    #root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      border: 1px solid rgba(239,68,68,0.12);
    }

    /* ── Header ── */
    #header {
      height: 42px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 12px;
      background: rgba(0,0,0,0.8);
      border-bottom: 1px solid rgba(239,68,68,0.1);
    }
    #brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }
    #brand-name {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.35em;
      color: #fff;
    }
    #brand-sub {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: #374151;
    }

    /* Status badge */
    #status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      display: none;
    }
    #live-dot.active {
      display: block;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }
    #status-text {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #374151;
    }
    #status-text.live { color: #f87171; }

    /* Close button */
    #close-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #4b5563;
      background: transparent;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-app-region: no-drag;
    }
    #close-btn:hover { background: rgba(239,68,68,0.12); color: #f87171; }

    /* ── Game time bar ── */
    #game-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(0,0,0,0.3);
    }
    #game-timer {
      font-family: monospace;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: -1px;
      color: #fff;
    }
    #game-mode {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #374151;
      margin-top: 3px;
    }
    #gold-display {
      text-align: right;
    }
    #gold-value {
      font-family: monospace;
      font-weight: 700;
      font-size: 16px;
      color: #fbbf24;
    }
    #gold-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: #4b5563;
      margin-top: 2px;
    }

    /* ── Player stat strip ── */
    #stat-strip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: #0d0d0d;
      gap: 8px;
    }
    .stat-box { text-align: center; }
    .stat-value {
      font-family: monospace;
      font-weight: 700;
      font-size: 15px;
      color: #f1f5f9;
      line-height: 1.1;
    }
    .stat-label {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: #4b5563;
      margin-top: 3px;
      text-transform: uppercase;
    }
    .kda-row {
      display: flex;
      align-items: center;
      gap: 2px;
      font-family: monospace;
      font-weight: 700;
      font-size: 15px;
    }
    .k { color: #4ade80; }
    .d { color: #f87171; }
    .a { color: #60a5fa; }
    .sep { color: #1f2937; }
    .divider { width: 1px; height: 24px; background: rgba(255,255,255,0.07); flex-shrink: 0; }
    #champ-name { font-size: 10px; font-weight: 600; color: #f87171; }
    #summoner-name { font-size: 8px; color: #4b5563; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── AI Coach ── */
    #ai-panel {
      flex-shrink: 0;
      margin: 8px 10px;
      border: 1px solid rgba(239,68,68,0.18);
      border-radius: 4px;
      background: rgba(127,29,29,0.07);
      overflow: hidden;
    }
    #ai-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-bottom: 1px solid rgba(239,68,68,0.1);
    }
    #ai-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #ai-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 5px #ef4444;
    }
    #ai-title {
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.4em;
      color: #f87171;
    }
    #ai-sub {
      font-size: 7px;
      letter-spacing: 0.2em;
      color: #374151;
    }
    #ai-advice {
      padding: 10px;
      font-size: 11px;
      line-height: 1.6;
      color: #d1d5db;
      min-height: 56px;
    }
    #ai-advice.loading {
      color: #4b5563;
      font-style: italic;
      font-size: 10px;
    }

    /* ── Teams ── */
    #teams {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
    }
    #teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .team-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.3em;
      margin-bottom: 6px;
      padding-left: 4px;
    }
    .team-label.blue { color: #60a5fa; }
    .team-label.red  { color: #f87171; }
    .player-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      margin-bottom: 2px;
      border-radius: 3px;
      font-size: 10px;
      border: 1px solid transparent;
      transition: background 0.15s;
    }
    .player-row.ally  { background: rgba(255,255,255,0.02); }
    .player-row.enemy { background: rgba(239,68,68,0.04); }
    .player-row.me    { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.18); }
    .player-row.dead  { opacity: 0.4; }
    .player-champ { font-weight: 600; color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-pos   { font-size: 8px; color: #4b5563; margin-top: 1px; }
    .player-kda   { font-family: monospace; font-size: 9px; text-align: right; flex-shrink: 0; margin-left: auto; }

    /* ── Waiting state ── */
    #waiting-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    #waiting-icon {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(239,68,68,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(239,68,68,0.4);
      animation: spin-idle 8s linear infinite;
    }
    #waiting-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #4b5563;
      text-align: center;
    }
    #waiting-sub {
      font-size: 9px;
      color: #374151;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Animations ── */
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
      50%       { box-shadow: 0 0 0 5px rgba(239,68,68,0); }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
    @keyframes spin-idle {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .ai-shimmer { animation: shimmer 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="root">

  <!-- HEADER -->
  <div id="header">
    <div id="brand">
      <div id="brand-dot"></div>
      <span id="brand-name">ATAK</span>
      <span id="brand-sub">COMPANION</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div id="status-badge">
        <div id="live-dot"></div>
        <span id="status-text">STANDBY</span>
      </div>
      <button id="close-btn" class="no-drag" onclick="closeOverlay()" title="Close">×</button>
    </div>
  </div>

  <!-- WAITING SCREEN (shown when not in game) -->
  <div id="waiting-screen">
    <div id="waiting-icon">◈</div>
    <div id="waiting-title">WATCHING FOR YOUR MATCH</div>
    <div id="waiting-sub">
      ATAK AI will automatically appear<br>when a League game is detected.
    </div>
  </div>

  <!-- LIVE HUD (hidden until in game) -->
  <div id="live-hud" style="display:none;flex-direction:column;flex:1;overflow:hidden;">

    <!-- Game time bar -->
    <div id="game-bar">
      <div>
        <div id="game-timer">0:00</div>
        <div id="game-mode">CLASSIC</div>
      </div>
      <div id="gold-display">
        <div id="gold-value">0<span style="font-size:9px;color:#6b7280;margin-left:2px;">g</span></div>
        <div id="gold-label">GOLD</div>
      </div>
    </div>

    <!-- Stat strip -->
    <div id="stat-strip">
      <div class="stat-box">
        <div class="kda-row">
          <span class="k" id="stat-kills">0</span>
          <span class="sep">/</span>
          <span class="d" id="stat-deaths">0</span>
          <span class="sep">/</span>
          <span class="a" id="stat-assists">0</span>
        </div>
        <div class="stat-label">K / D / A</div>
      </div>
      <div class="divider"></div>
      <div class="stat-box">
        <div class="stat-value" id="stat-kda">—</div>
        <div class="stat-label">KDA</div>
      </div>
      <div class="divider"></div>
      <div class="stat-box">
        <div class="stat-value" id="stat-cs">0</div>
        <div class="stat-label" id="stat-cspm">— CS/m</div>
      </div>
      <div class="divider"></div>
      <div class="stat-box">
        <div class="stat-value" id="stat-level">LV1</div>
        <div class="stat-label">LEVEL</div>
      </div>
      <div class="divider"></div>
      <div style="text-align:right;min-width:0;">
        <div id="champ-name">—</div>
        <div id="summoner-name">—</div>
      </div>
    </div>

    <!-- AI Coach -->
    <div id="ai-panel">
      <div id="ai-header">
        <div id="ai-label">
          <div id="ai-dot"></div>
          <span id="ai-title">ATAK AI</span>
          <span id="ai-sub">COACH</span>
        </div>
      </div>
      <div id="ai-advice">Waiting for match data...</div>
    </div>

    <!-- Teams -->
    <div id="teams">
      <div id="teams-grid">
        <div>
          <div class="team-label blue" id="ally-label">◈ ORDER</div>
          <div id="ally-list"></div>
        </div>
        <div>
          <div class="team-label red" id="enemy-label">◈ CHAOS</div>
          <div id="enemy-list"></div>
        </div>
      </div>
    </div>

  </div><!-- /live-hud -->

</div><!-- /root -->

<script src="in_game.js"></script>
</body>
</html>
