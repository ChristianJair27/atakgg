<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ATAK AI Coach</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0a0a0b;overflow:hidden}
  body{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    font-family:'Segoe UI',system-ui,sans-serif;color:#e8e8ea;
  }
  #gem{
    width:96px;height:96px;border-radius:20px;overflow:hidden;
    box-shadow:0 0 56px rgba(239,68,68,.45),0 0 120px rgba(239,68,68,.15);
    border:2px solid rgba(239,68,68,.35);
  }
  #gem img{width:100%;height:100%;object-fit:cover;display:block}
  #title{font-size:32px;font-weight:900;letter-spacing:.06em;color:#fff;line-height:1}
  #sub{font-size:10px;font-weight:700;letter-spacing:.3em;color:rgba(239,68,68,.7);margin-top:-6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  #spinner{
    width:28px;height:28px;border-radius:50%;
    border:2.5px solid rgba(255,255,255,.07);
    border-top-color:rgba(239,68,68,.6);
    animation:spin .9s linear infinite;
    margin-top:4px;
  }
  #status{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.04em;min-height:18px;text-align:center}
  #hint{display:none;text-align:center;max-width:320px;margin-top:4px}
  #hint p{font-size:11px;color:rgba(255,255,255,.3);line-height:1.7;margin-bottom:14px}
  .btn{
    display:inline-block;padding:10px 22px;border:none;cursor:pointer;border-radius:8px;
    font-size:12px;font-weight:700;letter-spacing:.1em;color:#fff;
    background:linear-gradient(135deg,#ef4444,#b91c1c);transition:.18s;
  }
  .btn:hover{background:linear-gradient(135deg,#f87171,#ef4444)}
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 700px 400px at 50% 0%,rgba(239,68,68,.1),transparent);
  }
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
    background-size:44px 44px;
  }
  #app-frame{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;z-index:100}
</style>
</head>
<body>
  <div id="gem"><img src="atak-logo.png" alt="ATAK"></div>
  <div id="title">ATAK</div>
  <div id="sub">AI COACH</div>
  <div id="spinner"></div>
  <div id="status">Buscando tu perfil...</div>
  <div id="hint">
    <p>Abre League of Legends para que ATAK<br>detecte tu invocador automáticamente.</p>
    <button class="btn" onclick="openRoot()">Abrir sin perfil</button>
  </div>
  <iframe id="app-frame" allow="clipboard-read; clipboard-write" allowfullscreen></iframe>

<script>
const DEV  = 'http://localhost:8080'
const PROD = 'https://atakgg.revolution505.com'

const statusEl  = document.getElementById('status')
const hintEl    = document.getElementById('hint')
const spinnerEl = document.getElementById('spinner')
const frame     = document.getElementById('app-frame')

let navigated = false
let hintTimer = null

frame.addEventListener('load', () => {
  if (!navigated) return
  frame.style.display = 'block'
  ;['gem','title','sub','spinner','status','hint'].forEach(id => {
    const el = document.getElementById(id)
    if (el) el.style.display = 'none'
  })
})

function navigateTo(url) {
  if (navigated) return
  navigated = true
  if (hintTimer) { clearTimeout(hintTimer); hintTimer = null }
  statusEl.textContent = 'Cargando perfil...'
  frame.src = url
}

// Fallback: open the app root without navigating to a specific profile
function openRoot() {
  navigated = true
  if (hintTimer) { clearTimeout(hintTimer); hintTimer = null }
  hintEl.style.display = 'none'
  spinnerEl.style.display = 'block'
  statusEl.textContent = 'Abriendo...'
  // Try dev server first, then prod
  fetch(DEV + '/', { mode: 'no-cors', signal: AbortSignal.timeout(1500) })
    .then(() => { frame.src = DEV })
    .catch(() => { frame.src = PROD })
}

// Listen for the profile URL from background.js
if (typeof overwolf !== 'undefined') {
  overwolf.windows.onMessageReceived.addListener(msg => {
    const d = msg?.content
    if (d?.type === 'summoner-profile-url' && d?.url) {
      statusEl.textContent = 'Perfil encontrado ✓'
      navigateTo(d.url)
    }
  })
}

// Update status text while waiting to reassure the user
setTimeout(() => { if (!navigated) statusEl.textContent = 'Conectando a League of Legends...' }, 3000)
setTimeout(() => { if (!navigated) statusEl.textContent = 'Esperando que abras el cliente...' }, 10000)

// After 30s show the "open without profile" option as fallback
hintTimer = setTimeout(() => {
  if (navigated) return
  spinnerEl.style.display = 'none'
  statusEl.textContent = 'Liga no detectada'
  hintEl.style.display = 'block'
}, 30000)
</script>
</body>
</html>
