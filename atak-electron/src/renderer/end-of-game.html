<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATAK — Match Summary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:920px;height:640px;overflow:hidden;user-select:none;background:transparent}
:root{
  --red:#e23b4e;--gold:#fcd34d;--teal:#0bc4e3;--green:#34d399;--blue:#7dd3fc;
  --heading:'Instrument Serif',Georgia,serif;--body:'Barlow',system-ui,sans-serif;
}
body{font-family:var(--body);color:#fff}

/* Glass shell (rounded card filling the transparent window) */
.shell{
  position:relative;height:640px;display:flex;flex-direction:column;overflow:hidden;border-radius:18px;
  background:linear-gradient(180deg,rgba(10,11,15,.94),rgba(5,6,9,.96));
  box-shadow:0 20px 60px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,255,255,.08);
}
.shell::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.4px;z-index:5;
  background:linear-gradient(180deg,rgba(255,255,255,.4),rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,.4));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:2px}

/* ── Loading ── */
#loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:640px;gap:18px}
.ld-ring{width:48px;height:48px;border-radius:50%;border:3px solid rgba(226,59,78,.12);border-top-color:var(--red);animation:spin 1.1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#ld-text{font-family:var(--heading);font-style:italic;font-size:16px;color:rgba(255,255,255,.4);animation:shimm 1.4s ease-in-out infinite}
@keyframes shimm{0%,100%{opacity:.35}50%{opacity:.9}}

/* ── Main ── */
#main{display:none;flex-direction:column;height:640px}

/* Result banner */
#result-banner{height:74px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:relative;overflow:hidden;-webkit-app-region:drag;flex-shrink:0}
#result-banner.victory{background:linear-gradient(90deg,rgba(11,196,227,.16),rgba(125,211,252,.07) 50%,transparent);border-bottom:1px solid rgba(11,196,227,.25)}
#result-banner.defeat{background:linear-gradient(90deg,rgba(226,59,78,.16),rgba(185,28,28,.08) 50%,transparent);border-bottom:1px solid rgba(226,59,78,.25)}
#result-shimmer{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);animation:shimpass 3s ease-in-out infinite;pointer-events:none}
@keyframes shimpass{0%{left:-100%}50%{left:150%}100%{left:150%}}
#result-txt{font-family:var(--heading);font-style:italic;font-size:42px;line-height:1;letter-spacing:-.01em}
#result-banner.victory #result-txt{color:var(--teal);text-shadow:0 0 40px rgba(11,196,227,.45)}
#result-banner.defeat #result-txt{color:var(--red);text-shadow:0 0 40px rgba(226,59,78,.4)}
#result-meta{text-align:right;-webkit-app-region:no-drag;margin-right:32px}
#result-mode{font-size:9px;font-weight:600;letter-spacing:.3em;color:rgba(255,255,255,.3)}
#result-time{font-family:var(--heading);font-style:italic;font-size:24px;color:rgba(255,255,255,.65)}
#close-btn{-webkit-app-region:no-drag;position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,.3);font-size:15px;transition:.15s;display:flex;align-items:center;justify-content:center;z-index:6}
#close-btn:hover{background:rgba(226,59,78,.16);color:var(--red)}

/* Your performance */
#my-perf{display:flex;align-items:center;padding:12px 16px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.05)}
#my-champ-wrap{position:relative;flex-shrink:0;margin-right:14px}
#my-champ-img{width:56px;height:56px;border-radius:11px;object-fit:cover;border:2px solid rgba(226,59,78,.4);display:block}
#my-champ-level{position:absolute;bottom:-4px;right:-4px;font-size:8px;font-weight:800;padding:1px 5px;background:#0a0b0f;border:1px solid rgba(255,255,255,.12);border-radius:5px;color:rgba(255,255,255,.75)}
#my-kda-big{display:flex;align-items:baseline;gap:4px;margin-right:22px}
.mkda-v{font-family:var(--heading);font-style:italic;font-size:32px;line-height:1}
.mkda-sep{font-family:var(--heading);font-style:italic;font-size:22px;color:rgba(255,255,255,.15)}
#my-grade{font-family:var(--heading);font-style:italic;font-size:40px;width:46px;text-align:center;flex-shrink:0;margin-right:16px}
.grade-s{color:#f0e6d3}.grade-a{color:var(--teal)}.grade-b{color:var(--green)}.grade-c{color:var(--gold)}.grade-d{color:var(--red)}
.my-stat-col{display:flex;flex-direction:column;gap:2px;min-width:62px}
.ms-v{font-size:15px;font-weight:700;color:#fff;line-height:1}
.ms-l{font-size:6.5px;font-weight:600;letter-spacing:.2em;color:rgba(255,255,255,.28)}
.vs-div{width:1px;height:38px;background:rgba(255,255,255,.06);margin:0 14px;align-self:center}
#my-items-row{display:flex;gap:3px;margin-left:auto}
.my-item{width:32px;height:32px;border-radius:7px;object-fit:cover;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04)}
.my-item.empty{opacity:.15}

/* Scoreboard */
#scoreboard{flex:1;overflow-y:auto;padding:6px 0 10px}
.team-block{margin-bottom:4px}
.team-hdr{display:flex;align-items:center;gap:8px;padding:6px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.team-hdr.victory-hdr{background:rgba(11,196,227,.07)}
.team-hdr.defeat-hdr{background:rgba(226,59,78,.05)}
.th-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.th-blue .th-dot{background:var(--blue)}.th-red .th-dot{background:var(--red)}
.th-name{font-size:8px;font-weight:600;letter-spacing:.22em;flex:1}
.th-blue .th-name{color:var(--blue)}.th-red .th-name{color:var(--red)}
.th-win-badge{font-size:7px;font-weight:600;letter-spacing:.15em;padding:2px 9px;border-radius:20px}
.th-win-badge.win{background:rgba(11,196,227,.12);color:var(--teal);border:1px solid rgba(11,196,227,.25)}
.th-win-badge.loss{background:rgba(226,59,78,.08);color:var(--red);border:1px solid rgba(226,59,78,.2)}
.th-col-hdrs{margin-left:auto;display:flex;font-size:6.5px;font-weight:600;letter-spacing:.15em;color:rgba(255,255,255,.22)}
.th-ch{width:55px;text-align:center}.th-ch.wide{width:80px}

.prow{display:flex;align-items:center;padding:5px 16px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .12s}
.prow:hover{background:rgba(255,255,255,.02)}
.prow.is-me{background:rgba(226,59,78,.06);border-left:2px solid rgba(226,59,78,.4)}
.pr-champ{width:30px;height:30px;border-radius:7px;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,255,255,.08);margin-right:9px}
.pr-name{width:104px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:9px;font-weight:600;color:rgba(255,255,255,.75)}
.pr-name.me{color:var(--red)}
.pr-multi{font-size:7px;font-weight:600;padding:1px 4px;border-radius:4px;margin-left:3px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.pr-multi.penta{background:rgba(226,59,78,.14);color:var(--red);border-color:rgba(226,59,78,.3)}
.pr-multi.quadra{background:rgba(168,85,247,.12);color:#c4b5fd;border-color:rgba(168,85,247,.3)}
.pr-multi.triple{background:rgba(11,196,227,.1);color:var(--teal);border-color:rgba(11,196,227,.25)}
.pr-kda{width:55px;text-align:center;font-family:var(--heading);font-style:italic;font-size:13px;color:rgba(255,255,255,.8)}
.pr-kda .dk{color:var(--green)}.pr-kda .dd{color:var(--red)}.pr-kda .da{color:var(--blue)}
.pr-cs{width:50px;text-align:center;font-size:8px;color:rgba(255,255,255,.42);font-weight:500}
.pr-gold{width:52px;text-align:center;font-size:8.5px;font-weight:600;color:var(--gold)}
.pr-items{display:flex;gap:2px;width:200px;flex-shrink:0}
.pi{width:24px;height:24px;border-radius:5px;object-fit:cover;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04)}
.pi.empty{opacity:.1;border-style:dashed}
.pi.trinket{border-color:rgba(226,59,78,.2)}
.pr-dmg{flex:1;padding-left:10px;display:flex;align-items:center;gap:5px}
.dmg-bar{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;position:relative}
.dmg-fill{height:100%;border-radius:3px;transition:width .8s ease}
.dmg-fill.ally{background:linear-gradient(90deg,rgba(11,196,227,.7),rgba(125,211,252,.9))}
.dmg-fill.enemy{background:linear-gradient(90deg,rgba(226,59,78,.6),rgba(248,113,113,.85))}
.dmg-txt{font-size:7.5px;font-weight:600;color:rgba(255,255,255,.4);min-width:34px;text-align:right;flex-shrink:0}
.pr-vs{width:30px;text-align:center;font-size:7.5px;color:rgba(196,181,253,.7)}

/* Arena placement */
.arena-place{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--heading);font-style:italic;font-size:14px;flex-shrink:0;margin-right:9px}
.arena-place.p1{background:rgba(252,211,77,.2);color:#fde68a;border:2px solid rgba(252,211,77,.5)}
.arena-place.p2{background:rgba(148,163,184,.15);color:#cbd5e1;border:2px solid rgba(148,163,184,.35)}
.arena-place.p3{background:rgba(184,115,64,.15);color:#d8a07a;border:2px solid rgba(184,115,64,.35)}
.arena-place.pX{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1)}

/* Footer */
#footer{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0}
#footer-brand{display:flex;align-items:center;gap:7px}
#footer-gem{width:16px;height:16px;color:var(--red)}
#footer-nm{font-family:var(--heading);font-style:italic;font-size:15px;color:#fff}
#open-web-btn{font-size:7.5px;font-weight:600;letter-spacing:.15em;padding:5px 14px;border-radius:8px;background:rgba(226,59,78,.1);border:1px solid rgba(226,59,78,.25);color:rgba(248,113,113,.85);cursor:pointer;transition:.15s;-webkit-app-region:no-drag}
#open-web-btn:hover{background:rgba(226,59,78,.18);color:#fff}
</style>
</head>
<body>
<div class="shell">
  <!-- Loading -->
  <div id="loading-state">
    <div class="ld-ring"></div>
    <div id="ld-text">Procesando partida…</div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="result-banner">
      <div id="result-shimmer"></div>
      <span id="result-txt">—</span>
      <div id="result-meta">
        <div id="result-mode">CLASSIC</div>
        <div id="result-time">0:00</div>
      </div>
      <button id="close-btn" onclick="closeMe()">✕</button>
    </div>

    <div id="my-perf">
      <div id="my-champ-wrap">
        <img id="my-champ-img" src="" alt="" onerror="this.style.opacity='.08'"/>
        <div id="my-champ-level">—</div>
      </div>
      <div id="my-kda-big">
        <span class="mkda-v" id="mk-k" style="color:var(--green)">0</span>
        <span class="mkda-sep">/</span>
        <span class="mkda-v" id="mk-d" style="color:var(--red)">0</span>
        <span class="mkda-sep">/</span>
        <span class="mkda-v" id="mk-a" style="color:var(--blue)">0</span>
      </div>
      <div id="my-grade" class="grade-c">B</div>
      <div class="my-stat-col"><div class="ms-v" id="my-dmg">—</div><div class="ms-l">DMG DEALT</div></div>
      <div class="vs-div"></div>
      <div class="my-stat-col"><div class="ms-v" id="my-cs">—</div><div class="ms-l">CS</div></div>
      <div class="vs-div"></div>
      <div class="my-stat-col"><div class="ms-v" id="my-gold">—</div><div class="ms-l">GOLD</div></div>
      <div class="vs-div"></div>
      <div class="my-stat-col"><div class="ms-v" id="my-vs">—</div><div class="ms-l">VISION</div></div>
      <div id="my-items-row"></div>
    </div>

    <div id="scoreboard"></div>

    <div id="footer">
      <div id="footer-brand">
        <svg id="footer-gem" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.2l1.85 12.4-1.85 2.5-1.85-2.5L12 1.2z"/><path d="M7.3 14.0h9.4v1.6H7.3z"/><path d="M11.05 15.8h1.9v4.9l-.95 1.1-.95-1.1z"/></svg>
        <span id="footer-nm">atak</span>
      </div>
      <button id="open-web-btn" onclick="openProfile()">VER STATS COMPLETAS EN ATAK.GG →</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
// Electron when running inside the app; harmless stubs in a plain browser (preview).
const _el = (typeof window !== 'undefined' && window.require) ? window.require('electron') : {};
const ipcRenderer = _el.ipcRenderer || { on: () => {} };
const shell = _el.shell || { openExternal: (u) => window.open(u, '_blank') };
const $ = id => document.getElementById(id)
let ddPatch = null, lastEogData = null, currentPlatform = 'la1'

async function getPatch() {
  if (ddPatch) return ddPatch
  try { ddPatch = (await (await fetch('https://ddragon.leagueoflegends.com/api/versions.json')).json())[0] }
  catch { ddPatch = '15.1.1' }
  return ddPatch
}
function champIcon(id) { return `https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/champion-icons/${id}.png` }

function fmtGold(g) { return g >= 1000 ? (g/1000).toFixed(1)+'k' : String(Math.round(g)) }
function fmtDmg(d)  { return d >= 1000 ? (d/1000).toFixed(1)+'k' : String(Math.round(d)) }
function fmtTime(s) { const m=Math.floor(s/60),sec=s%60; return m+':'+(sec<10?'0':'')+sec }

function calcGrade(win, kda, dmgPct, csPm) {
  let score = 0
  if (kda >= 5) score += 35; else if (kda >= 3) score += 25; else if (kda >= 2) score += 15; else if (kda >= 1) score += 5
  if (dmgPct >= .25) score += 30; else if (dmgPct >= .18) score += 20; else if (dmgPct >= .12) score += 10
  if (csPm >= 8) score += 20; else if (csPm >= 6) score += 13; else if (csPm >= 4) score += 6
  if (win) score += 15
  if (score >= 85) return 'S'
  if (score >= 68) return 'A'
  if (score >= 50) return 'B'
  if (score >= 30) return 'C'
  return 'D'
}
function gradeClass(g) { return { S:'grade-s', A:'grade-a', B:'grade-b', C:'grade-c', D:'grade-d' }[g] || 'grade-c' }
function multiKillLabel(n) { if (!n || n < 2) return null; const l=[null,'Double','Triple','Quadra','Penta']; return l[Math.min(n,4)]||'Penta' }
function multiKillClass(n) { if (n>=5) return 'penta'; if (n>=4) return 'quadra'; if (n>=3) return 'triple'; return '' }
function st(stats, key, def=0) { return stats?.[key] ?? def }

async function buildItemRow(stats, cls, size=24) {
  const patch = await getPatch()
  const frag = document.createDocumentFragment()
  for (const k of ['ITEM0','ITEM1','ITEM2','ITEM3','ITEM4','ITEM5']) {
    const id = st(stats, k, 0)
    const img = document.createElement('img')
    img.className = 'pi' + (cls ? ' '+cls : '')
    img.style.width = img.style.height = size+'px'
    if (id) { img.src = `https://ddragon.leagueoflegends.com/cdn/${patch}/img/item/${id}.png`; img.onerror = () => { img.style.opacity='.08' } }
    else { img.className = 'pi empty'; img.src = '' }
    frag.appendChild(img)
  }
  const t = st(stats, 'ITEM6', 0)
  const tri = document.createElement('img')
  tri.className = 'pi trinket'; tri.style.width = tri.style.height = size+'px'
  if (t) { tri.src = `https://ddragon.leagueoflegends.com/cdn/${patch}/img/item/${t}.png`; tri.onerror = () => { tri.style.opacity='.08' } }
  else { tri.className = 'pi empty'; tri.src = '' }
  frag.appendChild(tri)
  return frag
}

async function fillMyPerf(localPlayer, maxDmg, gameMode) {
  const s  = localPlayer.stats
  const k  = st(s,'CHAMPIONS_KILLED') || st(s,'KILLS')
  const d  = st(s,'DEATHS')
  const a  = st(s,'ASSISTS')
  const win = st(s,'WIN') === 1 || st(s,'WIN') === true
  const dmg = st(s,'TOTAL_DAMAGE_DEALT_TO_CHAMPIONS')
  const cs  = st(s,'MINIONS_KILLED') + st(s,'NEUTRAL_MINIONS_KILLED')
  const gold = st(s,'GOLD_EARNED')
  const vs  = st(s,'VISION_SCORE')
  const kda = d === 0 ? (k+a) : (k+a)/d

  $('mk-k').textContent = k; $('mk-d').textContent = d; $('mk-a').textContent = a
  $('my-dmg').textContent = fmtDmg(dmg); $('my-cs').textContent = cs
  $('my-gold').textContent = fmtGold(gold); $('my-vs').textContent = vs

  const csPm = cs / 30
  const dmgPct = maxDmg > 0 ? dmg / maxDmg : 0
  const grade = calcGrade(win, kda, dmgPct, csPm)
  $('my-grade').textContent = grade; $('my-grade').className = gradeClass(grade)

  $('my-champ-img').src = champIcon(localPlayer.championId)
  $('my-champ-level').textContent = localPlayer.level || '—'

  $('my-items-row').appendChild(await buildItemRow(s, null, 32))
  if (window.gsap) gsap.from('#my-perf > *', { opacity:0, y:-6, duration:.4, stagger:.06, ease:'power2.out' })
}

async function buildScoreboard(data) {
  const sb = $('scoreboard'); sb.innerHTML = ''
  const isArena = (data.gameMode || '').toUpperCase() === 'CHERRY'
  const localTeamId = data.localPlayer?.teamId
  const localSummoner = data.localPlayer?.summonerName

  let maxDmg = 1
  for (const team of (data.teams || [])) for (const p of (team.players || [])) {
    const d = st(p.stats,'TOTAL_DAMAGE_DEALT_TO_CHAMPIONS'); if (d > maxDmg) maxDmg = d
  }
  const ldmg = st(data.localPlayer?.stats, 'TOTAL_DAMAGE_DEALT_TO_CHAMPIONS'); if (ldmg > maxDmg) maxDmg = ldmg

  await fillMyPerf(data.localPlayer, maxDmg, data.gameMode)

  if (isArena) await buildArenaScoreboard(sb, data, maxDmg, localSummoner)
  else await buildSRScoreboard(sb, data, maxDmg, localTeamId, localSummoner)

  if (window.gsap) gsap.from('.prow', { opacity:0, x:-8, duration:.35, stagger:.025, ease:'power2.out', delay:.2 })
}

async function buildSRScoreboard(sb, data, maxDmg, localTeamId, localSummoner) {
  for (const team of (data.teams || [])) {
    const isBlue = team.teamId === 100
    const isWin = team.isWinningTeam
    const block = document.createElement('div'); block.className = 'team-block'
    const hdr = document.createElement('div')
    hdr.className = `team-hdr ${isBlue ? 'th-blue' : 'th-red'} ${isWin ? 'victory-hdr' : 'defeat-hdr'}`
    hdr.innerHTML = `
      <div class="th-dot"></div>
      <span class="th-name">${isBlue ? 'EQUIPO AZUL' : 'EQUIPO ROJO'}</span>
      <span class="th-win-badge ${isWin?'win':'loss'}">${isWin?'VICTORIA':'DERROTA'}</span>
      <div class="th-col-hdrs">
        <div class="th-ch">KDA</div>
        <div class="th-ch">CS</div>
        <div class="th-ch">GOLD</div>
        <div style="width:200px;text-align:center">ITEMS</div>
        <div style="flex:1;text-align:center;padding-left:10px">DAÑO</div>
      </div>`
    block.appendChild(hdr)
    for (const p of (team.players || [])) block.appendChild(await buildPlayerRow(p, maxDmg, localSummoner, isBlue ? 'ally' : 'enemy'))
    sb.appendChild(block)
  }
}

async function buildArenaScoreboard(sb, data, maxDmg, localSummoner) {
  const allPlayers = []
  for (const team of (data.teams || [])) allPlayers.push(...(team.players || []))
  allPlayers.sort((a,b) => {
    const pa = st(a.stats,'SUBTEAM_PLACEMENT',99), pb = st(b.stats,'SUBTEAM_PLACEMENT',99)
    if (pa !== pb) return pa - pb
    return st(b.stats,'CHAMPIONS_KILLED') - st(a.stats,'CHAMPIONS_KILLED')
  })
  const block = document.createElement('div'); block.className = 'team-block'
  const hdr = document.createElement('div'); hdr.className = 'team-hdr victory-hdr'
  hdr.innerHTML = `
    <span class="th-name" style="color:var(--gold)">ARENA — TODOS LOS JUGADORES</span>
    <div class="th-col-hdrs">
      <div class="th-ch">KDA</div>
      <div style="width:200px;text-align:center">ITEMS</div>
      <div style="flex:1;text-align:center;padding-left:10px">DAÑO</div>
    </div>`
  block.appendChild(hdr)
  for (const p of allPlayers) block.appendChild(await buildPlayerRow(p, maxDmg, localSummoner, 'ally', true))
  sb.appendChild(block)
}

async function buildPlayerRow(p, maxDmg, localSummoner, side, isArena=false) {
  const s    = p.stats
  const k    = st(s,'CHAMPIONS_KILLED') || st(s,'KILLS')
  const d    = st(s,'DEATHS')
  const a    = st(s,'ASSISTS')
  const cs   = st(s,'MINIONS_KILLED') + st(s,'NEUTRAL_MINIONS_KILLED')
  const gold = st(s,'GOLD_EARNED')
  const dmg  = st(s,'TOTAL_DAMAGE_DEALT_TO_CHAMPIONS')
  const vs   = st(s,'VISION_SCORE')
  const multi = st(s,'LARGEST_MULTI_KILL')
  const place = st(s,'SUBTEAM_PLACEMENT',0)
  const isMe = p.summonerName === localSummoner

  const row = document.createElement('div'); row.className = `prow${isMe?' is-me':''}`

  if (isArena && place > 0) {
    const plEl = document.createElement('div')
    plEl.className = 'arena-place ' + (place===1?'p1':place===2?'p2':place===3?'p3':'pX')
    plEl.textContent = place; row.appendChild(plEl)
  }

  const img = document.createElement('img'); img.className = 'pr-champ'; img.src = champIcon(p.championId); img.onerror = () => { img.style.opacity = '.08' }
  row.appendChild(img)

  const nameWrap = document.createElement('div')
  nameWrap.style.display='flex'; nameWrap.style.alignItems='center'; nameWrap.style.flex='1'; nameWrap.style.minWidth='0'
  const nameEl = document.createElement('span'); nameEl.className = `pr-name${isMe?' me':''}`
  nameEl.textContent = p.summonerName || p.riotIdGameName || '—'; nameWrap.appendChild(nameEl)
  if (multi >= 2) { const ml=document.createElement('span'); ml.className=`pr-multi ${multiKillClass(multi)}`; ml.textContent=multiKillLabel(multi); nameWrap.appendChild(ml) }
  row.appendChild(nameWrap)

  const kdaEl = document.createElement('div'); kdaEl.className = 'pr-kda'
  kdaEl.innerHTML = `<span class="dk">${k}</span>/<span class="dd">${d}</span>/<span class="da">${a}</span>`
  row.appendChild(kdaEl)

  if (!isArena) {
    const csEl = document.createElement('div'); csEl.className = 'pr-cs'; csEl.textContent = cs; row.appendChild(csEl)
    const goldEl = document.createElement('div'); goldEl.className = 'pr-gold'; goldEl.textContent = fmtGold(gold); row.appendChild(goldEl)
  }

  const itemsWrap = document.createElement('div'); itemsWrap.className = 'pr-items'
  itemsWrap.appendChild(await buildItemRow(s, '', 24)); row.appendChild(itemsWrap)

  const dmgWrap = document.createElement('div'); dmgWrap.className = 'pr-dmg'
  const bar = document.createElement('div'); bar.className = 'dmg-bar'
  const fill = document.createElement('div'); fill.className = `dmg-fill ${side}`
  const pct = maxDmg > 0 ? Math.min(100, (dmg / maxDmg) * 100) : 0
  fill.style.width = '0%'; bar.appendChild(fill); dmgWrap.appendChild(bar)
  const dtxt = document.createElement('span'); dtxt.className = 'dmg-txt'; dtxt.textContent = fmtDmg(dmg); dmgWrap.appendChild(dtxt)
  row.appendChild(dmgWrap)
  setTimeout(() => { if (window.gsap) gsap.to(fill, { width: pct+'%', duration:.9, ease:'power2.out', delay:.3 }); else fill.style.width = pct+'%' }, 50)

  if (!isArena) { const vsEl=document.createElement('div'); vsEl.className='pr-vs'; vsEl.textContent=vs; row.appendChild(vsEl) }
  return row
}

async function renderEog(data) {
  lastEogData = data
  await getPatch()
  const isArena = (data.gameMode || '').toUpperCase() === 'CHERRY'
  const myWin = data.localPlayer?.stats?.WIN === 1 || data.localPlayer?.stats?.WIN === true
  const banner = $('result-banner')
  banner.className = myWin ? 'victory' : 'defeat'
  $('result-txt').textContent = myWin ? 'VICTORIA' : 'DERROTA'
  $('result-mode').textContent = modeLabel(data.gameMode)
  $('result-time').textContent = fmtTime(data.gameLength || 0)

  $('loading-state').style.display = 'none'
  $('main').style.display = 'flex'

  await buildScoreboard(data)
  if (window.gsap) gsap.from('#result-banner', { opacity:0, y:-20, duration:.6, ease:'power3.out' })
}

function modeLabel(m) {
  const map = { CLASSIC:"SUMMONER'S RIFT", ARAM:'ARAM', CHERRY:'ARENA', URF:'URF', TUTORIAL:'TUTORIAL', NEXUSBLITZ:'NEXUS BLITZ' }
  return map[(m||'').toUpperCase()] || (m || 'CUSTOM')
}

function openProfile() {
  const name = lastEogData?.localPlayer?.summonerName || lastEogData?.localPlayer?.riotIdGameName
  if (!name) return
  try { shell.openExternal(`http://localhost:8080/stats/${currentPlatform}/${encodeURIComponent(name)}`) } catch {}
}
