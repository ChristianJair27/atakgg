<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ATAK.GG HUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #e23b4e;
      --ink: rgba(10, 11, 15, 0.82);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f1f1f1;
      --muted: rgba(255,255,255,0.4);
      --green: #34d399;
      --yellow: #fcd34d;
      --heading: 'Instrument Serif', Georgia, serif;
      --body: 'Barlow', system-ui, sans-serif;
    }

    body {
      font-family: var(--body);
      background: transparent;
      color: var(--text);
      user-select: none;
      overflow: hidden;
      width: 290px;
    }

    /* ── Liquid glass HUD ── */
    .hud {
      position: relative;
      background: var(--ink);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 36px rgba(0,0,0,0.55), inset 0 1px 1px rgba(255,255,255,0.10);
    }
    .hud::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,.45) 0%, rgba(255,255,255,.14) 20%,
        rgba(255,255,255,0) 42%, rgba(255,255,255,0) 58%,
        rgba(255,255,255,.14) 80%, rgba(255,255,255,.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }

    /* Title bar */
    .title-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 11px 8px;
      background: rgba(0,0,0,0.35);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag; cursor: move;
    }
    .title-bar .logo { display: flex; align-items: center; gap: 7px; }
    .logo-mark {
      width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(226,59,78,.20), rgba(226,59,78,.04));
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 12px; height: 12px; color: var(--red); }
    .logo-word { font-family: var(--heading); font-style: italic; font-size: 17px; color: #fff; line-height: 1; }
    .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .title-btn {
      -webkit-app-region: no-drag; cursor: pointer;
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; font-size: 13px; color: var(--muted);
      border: none; background: transparent; transition: background 0.15s, color 0.15s;
    }
    .title-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* Waiting state */
    .waiting { padding: 24px 14px; text-align: center; }
    .waiting-icon { font-size: 30px; margin-bottom: 10px; opacity: 0.5; }
    .waiting-text { font-family: var(--heading); font-style: italic; font-size: 17px; color: rgba(255,255,255,0.75); line-height: 1.4; }
    .waiting-hint { margin-top: 10px; font-size: 9.5px; font-weight: 300; color: rgba(226,59,78,0.7); letter-spacing: 0.4px; }

    /* Game content */
    .game-content { display: none; }
    .game-content.active { display: block; }

    /* Player info */
    .player-info { padding: 10px 13px 7px; border-bottom: 1px solid var(--border); }
    .champion-name { font-family: var(--heading); font-style: italic; font-size: 19px; color: var(--text); line-height: 1; }
    .summoner-name { font-size: 9.5px; font-weight: 300; color: var(--muted); margin-top: 3px; }

    /* KDA section */
    .kda-section { padding: 11px 12px 9px; border-bottom: 1px solid var(--border); text-align: center; }
    .kda-row {
      display: flex; justify-content: center; align-items: baseline; gap: 3px;
      font-family: var(--heading); font-style: italic; font-size: 30px; line-height: 1; letter-spacing: -0.5px;
    }
    .kda-k { color: var(--green); }
    .kda-sep { color: rgba(255,255,255,0.18); font-size: 20px; margin: 0 2px; }
    .kda-d { color: #fca5a5; }
    .kda-a { color: #93c5fd; }
    .kda-labels { display: flex; justify-content: center; gap: 16px; margin-top: 5px; font-size: 8.5px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
    .kda-label-k { color: var(--green); opacity: 0.7; }
    .kda-label-d { color: #fca5a5; opacity: 0.7; }
    .kda-label-a { color: #93c5fd; opacity: 0.7; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
    .stat-cell { padding: 8px 13px; border-right: 1px solid var(--border); }
    .stat-cell:nth-child(even) { border-right: none; }
    .stat-label { font-size: 8.5px; font-weight: 600; letter-spacing: 0.9px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .stat-value { font-family: var(--heading); font-style: italic; font-size: 19px; color: var(--text); line-height: 1; }
    .stat-value.gold-val { color: var(--yellow); }

    /* Game time bar */
    .time-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 13px; background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border); font-size: 9px;
    }
    .time-label { color: var(--muted); letter-spacing: 0.6px; font-weight: 500; }
    .time-value { font-family: var(--heading); font-style: italic; font-size: 16px; color: var(--text); }

    /* Objectives */
    .objectives { padding: 8px 13px; border-bottom: 1px solid var(--border); }
    .obj-title { font-size: 8.5px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .obj-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; font-size: 11px; }
    .obj-name { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.78); }
    .obj-time { font-family: var(--body); font-size: 11px; font-weight: 600; }
    .obj-time.active { color: var(--green); }
    .obj-time.soon { color: var(--yellow); }
    .obj-time.upcoming { color: var(--muted); }
    .obj-time.dead { color: rgba(255,255,255,0.25); text-decoration: line-through; }

    /* Footer */
    .hud-footer { padding: 7px 13px; display: flex; align-items: center; justify-content: space-between; }
    .hotkey-hint { font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 0.5px; }
    .hotkey-key { display: inline-block; padding: 1px 5px; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; font-size: 9px; }

    /* Header buttons */
    .title-btns { display: flex; align-items: center; gap: 2px; -webkit-app-region: no-drag; }

    /* Items */
    .items-row { display: flex; gap: 3px; padding: 8px 13px; border-bottom: 1px solid var(--border); align-items: center; }
    .items-row .il { font-size: 8px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-right: 3px; flex-shrink: 0; }
    .iitem { width: 24px; height: 24px; border-radius: 6px; object-fit: cover; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); }
    .iitem.empty { opacity: .16; border-style: dashed; background: transparent; }

    /* Extra stats (vision / KP) */
    .xrow { display: flex; border-bottom: 1px solid var(--border); }
    .xcell { flex: 1; padding: 7px 13px; display: flex; align-items: baseline; gap: 6px; justify-content: center; }
    .xcell + .xcell { border-left: 1px solid var(--border); }
    .xcell .xv { font-family: var(--heading); font-style: italic; font-size: 16px; color: #fff; }
    .xcell .xl { font-size: 8px; letter-spacing: 1.2px; color: var(--muted); text-transform: uppercase; }

    /* Teams scoreboard */
    .teams { padding: 9px 11px; border-bottom: 1px solid var(--border); }
    .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 9px; }
    .tcol-h { font-size: 7.5px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
    .tcol-h.ally { color: var(--green); } .tcol-h.enemy { color: var(--red); }
    .tdot { width: 5px; height: 5px; border-radius: 50%; }
    .tcol-h.ally .tdot { background: var(--green); } .tcol-h.enemy .tdot { background: var(--red); }
    .prow2 { display: flex; align-items: center; gap: 5px; padding: 2.5px 3px; margin-bottom: 1px; border-radius: 6px; }
    .prow2.me { background: rgba(226,59,78,.12); }
    .prow2.dead { opacity: .4; filter: grayscale(.4); }
    .pic { width: 18px; height: 18px; border-radius: 5px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,.08); }
    .pnm { flex: 1; min-width: 0; font-size: 8.5px; color: rgba(255,255,255,.72); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pkda { font-size: 8px; color: rgba(255,255,255,.5); flex-shrink: 0; }
    .pkda .pk { color: var(--green); } .pkda .pd { color: #fca5a5; } .pkda .pa { color: #93c5fd; }

    /* Live coach notes */
    .notes-section { padding: 9px 13px; border-bottom: 1px solid var(--border); }
    .notes-title { font-size: 8.5px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--red); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
    .notes-title svg { width: 11px; height: 11px; color: var(--red); }
    #noteList { display: flex; flex-direction: column; gap: 5px; }
    .note { display: flex; align-items: flex-start; gap: 7px; font-size: 10.5px; line-height: 1.35; padding: 5px 8px; border-radius: 9px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); animation: noteIn .3s ease both; }
    @keyframes noteIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .note .ni { flex-shrink: 0; font-size: 12px; line-height: 1.2; }
    .note .nt { color: rgba(255,255,255,.8); }
    .note.warn { background: rgba(226,59,78,.09); border-color: rgba(226,59,78,.2); }
    .note.warn .nt { color: #fca5a5; }
    .note.good { background: rgba(52,211,153,.08); border-color: rgba(52,211,153,.18); }
    .note.good .nt { color: #86efac; }
    .note.info .nt { color: rgba(255,255,255,.72); }
    .note-empty { font-family: var(--heading); font-style: italic; font-size: 12px; color: rgba(255,255,255,.28); padding: 2px; }
  </style>
</head>
<body>
  <div class="hud">
    <!-- Title Bar -->
    <div class="title-bar">
      <div class="logo">
        <span class="logo-mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.2l1.85 12.4-1.85 2.5-1.85-2.5L12 1.2z"/><path d="M7.3 14.0h9.4v1.6H7.3z"/><path d="M11.05 15.8h1.9v4.9l-.95 1.1-.95-1.1z"/></svg></span>
        <span class="logo-word">atak</span>
        <span class="logo-dot" id="statusDot"></span>
      </div>
      <div class="title-btns">
        <button class="title-btn" id="pinBtn" title="Fijar siempre visible">⌖</button>
        <button class="title-btn" id="profileBtn" title="Ver mi perfil en ATAK.GG">◢</button>
        <button class="title-btn" id="toggleBtn" title="Ocultar (F8)">–</button>
        <button class="title-btn" id="closeBtn" title="Cerrar">✕</button>
      </div>
    </div>

    <!-- Waiting for game -->
    <div id="waitingState" class="waiting">
      <div class="waiting-icon">🗡️</div>
      <div class="waiting-text">Esperando a<br/>League of Legends…</div>
      <div class="waiting-hint">El HUD aparecerá automáticamente</div>
    </div>

    <!-- Game HUD (hidden until game detected) -->
    <div id="gameContent" class="game-content">
      <!-- Player -->
      <div class="player-info">
        <div class="champion-name" id="championName">—</div>
        <div class="summoner-name" id="summonerName">—</div>
      </div>

      <!-- KDA -->
      <div class="kda-section">
        <div class="kda-row">
          <span class="kda-k" id="statKills">0</span>
          <span class="kda-sep">/</span>
          <span class="kda-d" id="statDeaths">0</span>
          <span class="kda-sep">/</span>
          <span class="kda-a" id="statAssists">0</span>
        </div>
        <div class="kda-labels">
          <span class="kda-label-k">K</span>
          <span class="kda-label-d">D</span>
          <span class="kda-label-a">A</span>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-label">Minions</div>
          <div class="stat-value" id="statCs">0</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Gold</div>
          <div class="stat-value gold-val" id="statGold">0</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Nivel</div>
          <div class="stat-value" id="statLevel">1</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">CS/min</div>
          <div class="stat-value" id="statCsMin">0.0</div>
        </div>
      </div>

      <!-- Items -->
      <div class="items-row" id="itemsRow"><span class="il">Items</span></div>

      <!-- Vision / KP -->
      <div class="xrow">
        <div class="xcell"><span class="xv" id="statVision">0</span><span class="xl">Visión</span></div>
        <div class="xcell"><span class="xv" id="statKp">0%</span><span class="xl">KP</span></div>
      </div>

      <!-- Teams scoreboard -->
      <div class="teams">
        <div class="teams-grid">
          <div>
            <div class="tcol-h ally"><span class="tdot"></span>Aliados</div>
            <div id="allyList"></div>
          </div>
          <div>
            <div class="tcol-h enemy"><span class="tdot"></span>Enemigos</div>
            <div id="enemyList"></div>
          </div>
        </div>
      </div>

      <!-- Game Time -->
      <div class="time-bar">
        <span class="time-label">TIEMPO DE PARTIDA</span>
        <span class="time-value" id="gameTime">0:00</span>
      </div>

      <!-- Objectives -->
      <div class="objectives">
        <div class="obj-title">Objetivos</div>
        <div class="obj-row">
          <span class="obj-name">🐉 Dragón</span>
          <span class="obj-time" id="objDragon">—</span>
        </div>
        <div class="obj-row">
          <span class="obj-name">🔮 Heraldo</span>
          <span class="obj-time" id="objHerald">—</span>
        </div>
        <div class="obj-row">
          <span class="obj-name">👁 Barón</span>
          <span class="obj-time" id="objBaron">—</span>
        </div>
      </div>

      <!-- Live coach notes -->
      <div class="notes-section">
        <div class="notes-title">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.2l1.85 12.4-1.85 2.5-1.85-2.5L12 1.2z"/><path d="M7.3 14.0h9.4v1.6H7.3z"/><path d="M11.05 15.8h1.9v4.9l-.95 1.1-.95-1.1z"/></svg>
          Coach en vivo
        </div>
        <div id="noteList"><div class="note-empty">Analizando tu partida…</div></div>
      </div>

      <!-- Footer -->
      <div class="hud-footer">
        <span class="hotkey-hint">Ocultar: <span class="hotkey-key">F8</span></span>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = window.require('electron');

    // State
    let gameTime = 0;
    let localTick = null;

    // DOM refs
    const waitingState = document.getElementById('waitingState');
    const gameContent  = document.getElementById('gameContent');
    const statusDot    = document.getElementById('statusDot');

    const elKills   = document.getElementById('statKills');
    const elDeaths  = document.getElementById('statDeaths');
    const elAssists = document.getElementById('statAssists');
    const elCs      = document.getElementById('statCs');
    const elGold    = document.getElementById('statGold');
    const elLevel   = document.getElementById('statLevel');
    const elCsMin   = document.getElementById('statCsMin');
    const elTime    = document.getElementById('gameTime');
    const elChamp   = document.getElementById('championName');
    const elSumm    = document.getElementById('summonerName');
    const elDragon  = document.getElementById('objDragon');
    const elHerald  = document.getElementById('objHerald');
    const elBaron   = document.getElementById('objBaron');
    const elNotes   = document.getElementById('noteList');
    const elItems   = document.getElementById('itemsRow');
    const elVision  = document.getElementById('statVision');
    const elKp      = document.getElementById('statKp');
    const elAlly    = document.getElementById('allyList');
    const elEnemy   = document.getElementById('enemyList');
    let currentSummoner = '';

    const DDV = '16.13.1';
    const itemImg  = (id) => `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/item/${id}.png`;
    const champImg = (n)  => `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/champion/${(n || '').replace(/[^a-zA-Z0-9]/g, '')}.png`;

    function renderItems(items) {
      const ids = (items || []).slice(0, 7);
      let html = '<span class="il">Items</span>';
      for (let i = 0; i < 7; i++) {
        const id = ids[i];
        html += id
          ? `<img class="iitem" src="${itemImg(id)}" onerror="this.classList.add('empty');this.removeAttribute('src')"/>`
          : '<div class="iitem empty"></div>';
      }
      elItems.innerHTML = html;
    }

    function renderTeams(s) {
      const me = s.myTeam || 'ORDER';
      const mk = (p) => `<div class="prow2 ${p.isMe ? 'me' : ''} ${p.isDead ? 'dead' : ''}">
        <img class="pic" src="${champImg(p.championName)}" onerror="this.style.opacity=.12" />
        <span class="pnm">${p.championName || p.name || '—'}</span>
        <span class="pkda"><span class="pk">${p.kills}</span>/<span class="pd">${p.deaths}</span>/<span class="pa">${p.assists}</span></span>
      </div>`;
      const ally  = (s.players || []).filter((p) => p.team === me);
      const enemy = (s.players || []).filter((p) => p.team !== me);
      elAlly.innerHTML  = ally.map(mk).join('');
      elEnemy.innerHTML = enemy.map(mk).join('');
    }

    function fmt(secs) {
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    function fmtGold(g) {
      if (g >= 1000) return (g / 1000).toFixed(1) + 'k';
      return String(g);
    }

    function updateObjectives(t) {
      // Dragon: first spawn 5:00, respawn every 5:00
      if (t < 300) {
        elDragon.textContent = 'en ' + fmt(300 - t);
        elDragon.className = 'obj-time upcoming';
      } else {
        const cycle = Math.floor((t - 300) / 300);
        const nextSpawn = 300 + (cycle + 1) * 300;
        const remaining = nextSpawn - t;
        if (remaining < 30) {
          elDragon.textContent = '⚡ ' + fmt(remaining);
          elDragon.className = 'obj-time soon';
        } else {
          elDragon.textContent = fmt(remaining);
          elDragon.className = 'obj-time upcoming';
        }
      }

      // Herald: 8:00–14:00
      if (t < 480) {
        elHerald.textContent = 'en ' + fmt(480 - t);
        elHerald.className = 'obj-time upcoming';
      } else if (t <= 840) {
        elHerald.textContent = '🟢 ACTIVO';
        elHerald.className = 'obj-time active';
      } else {
        elHerald.textContent = 'Expirado';
        elHerald.className = 'obj-time dead';
      }

      // Baron: 20:00
      if (t < 1200) {
        const remaining = 1200 - t;
        if (remaining < 60) {
          elBaron.textContent = '⚡ ' + fmt(remaining);
          elBaron.className = 'obj-time soon';
        } else {
          elBaron.textContent = 'en ' + fmt(remaining);
          elBaron.className = 'obj-time upcoming';
        }
      } else {
        elBaron.textContent = '🟢 ACTIVO';
        elBaron.className = 'obj-time active';
      }
    }

    // ── Live coach: intuitive rule-based notes from the live game state ──
    function computeTips(s) {
      const tips = [];
      const t = s.gameTime || 0, min = t / 60;
      const cs = s.cs || 0, k = s.kills || 0, d = s.deaths || 0, a = s.assists || 0;
      const gold = s.gold || 0;
      const csm = min > 0 ? cs / min : 0;
      const arena = (s.gameMode || '').toUpperCase() === 'CHERRY';

      // Performance read (KDA)
      if (k >= 3 && d <= 1) tips.push({ k: 'good', i: '🔥', t: 'Vas adelantado — presiona y busca picks' });
      if (d >= 3 && d > k + a) tips.push({ k: 'warn', i: '🛡️', t: 'Juega seguro, no fuerces peleas' });

      if (!arena) {
        // Farm
        const target = min < 10 ? 6 : min < 20 ? 7 : 6.5;
        if (min > 3 && csm > 0 && csm < target - 1.5) tips.push({ k: 'warn', i: '🌾', t: `Farmea — vas en ${csm.toFixed(1)} CS/min` });
        else if (min > 3 && csm >= target) tips.push({ k: 'good', i: '🌾', t: `Buen farm (${csm.toFixed(1)} CS/min)` });

        // Recall
        if (gold >= 1300) tips.push({ k: 'info', i: '💰', t: `Tienes ${(gold / 1000).toFixed(1)}k oro — considera recall` });

        // Objectives (timer-based)
        const dragRem = t < 300 ? 300 - t : 300 - ((t - 300) % 300);
        if (t > 150 && dragRem <= 45) tips.push({ k: 'info', i: '🐉', t: 'Dragón pronto — agrupa y pon visión en río' });
        if (t >= 480 && t <= 840) tips.push({ k: 'info', i: '🔮', t: 'Heraldo activo — pelea o presiona con él' });
        if (t >= 1140 && t < 1200) tips.push({ k: 'warn', i: '👁', t: 'Barón pronto — visión y agrúpate' });
        else if (t >= 1200) tips.push({ k: 'info', i: '👁', t: 'Barón activo — no te separes del equipo' });

        // Mid-game rotations
        if (min >= 12 && min < 20) tips.push({ k: 'info', i: '🧭', t: 'Empuja tu ola y rota a objetivos' });
        if (min < 2) tips.unshift({ k: 'info', i: '⚔️', t: 'Inicio — controla la ola y wardea' });
      } else {
        // Arena (CHERRY)
        if (gold >= 1000) tips.push({ k: 'info', i: '💰', t: 'Compra/mejora ítems entre rondas' });
        if (d >= 2) tips.push({ k: 'warn', i: '🛡️', t: 'Usa el terreno y no te expongas' });
        tips.push({ k: 'info', i: '🤝', t: 'Pégate a tu dúo y reposiciónate' });
      }

      const order = { warn: 0, good: 1, info: 2 };
      tips.sort((x, y) => order[x.k] - order[y.k]);
      return tips.slice(0, 3);
    }

    function renderNotes(state) {
      const tips = computeTips(state);
      if (!tips.length) { elNotes.innerHTML = '<div class="note-empty">Vas bien — sigue así</div>'; return; }
      elNotes.innerHTML = tips.map(n =>
        `<div class="note ${n.k}"><span class="ni">${n.i}</span><span class="nt">${n.t}</span></div>`
      ).join('');
    }

    function updateDisplay(state) {
      elKills.textContent   = state.kills;
      elDeaths.textContent  = state.deaths;
      elAssists.textContent = state.assists;
      elCs.textContent      = state.cs;
      elGold.textContent    = fmtGold(state.gold);
      elLevel.textContent   = state.level;
      elChamp.textContent   = state.championName || '—';
      elSumm.textContent    = state.summonerName || '—';

      const minutes = Math.max(1, Math.floor(state.gameTime / 60));
      elCsMin.textContent = (state.cs / minutes).toFixed(1);

      gameTime = state.gameTime;
      elTime.textContent = fmt(gameTime);
      updateObjectives(gameTime);
      renderNotes(state);

      currentSummoner = state.summonerName || currentSummoner;
      renderItems(state.items);
      elVision.textContent = state.visionScore ?? 0;
      elKp.textContent = (state.killParticipation ?? 0) + '%';
      renderTeams(state);
    }

    function showGame() {
      waitingState.style.display = 'none';
      gameContent.classList.add('active');
      statusDot.style.background = '#34d399';
      statusDot.style.boxShadow = '0 0 6px #34d399';
    }

    function showWaiting() {
      waitingState.style.display = 'block';
      gameContent.classList.remove('active');
      statusDot.style.background = '#e23b4e';
      statusDot.style.boxShadow = '';
      if (localTick) { clearInterval(localTick); localTick = null; }
    }

    // IPC from main process
    ipcRenderer.on('live-data', (e, state) => {
      if (!state) return;
      showGame();
      updateDisplay(state);

      // local tick to update timer between polls
      if (!localTick) {
        localTick = setInterval(() => {
          gameTime++;
          elTime.textContent = fmt(gameTime);
          updateObjectives(gameTime);
        }, 1000);
      }
    });

    ipcRenderer.on('game-ended', () => {
      showWaiting();
    });

    // Header buttons
    document.getElementById('toggleBtn').addEventListener('click', () => ipcRenderer.send('toggle-overlay'));
    document.getElementById('pinBtn').addEventListener('click', () => ipcRenderer.send('pin-overlay'));
    document.getElementById('profileBtn').addEventListener('click', () => ipcRenderer.send('open-profile', currentSummoner));
    document.getElementById('closeBtn').addEventListener('click', () => window.close());

    // Initialize
    showWaiting();
  </script>
</body>
</html>
